# Default Immich chart values — copy from https://github.com/immich-app/immich-charts/blob/main/charts/immich/values.yaml
# Edit this file and apply changes via Flux by committing and pushing.
# The HelmRelease references this via spec.valuesFrom -> ConfigMap (generated by kustomize).

controllers:
  main:
    nodeSelector:
      kubernetes.io/hostname: s145
    containers:
      main:
        image:
          tag: v2.7.5
        env:
          TZ: Asia/Kolkata
          REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
          IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
          DB_HOSTNAME: immich-postgres
          DB_PORT: "5432"
          DB_USERNAME:
            valueFrom:
              secretKeyRef:
                name: immich-secret
                key: DB_USERNAME
          DB_DATABASE_NAME:
            valueFrom:
              secretKeyRef:
                name: immich-secret
                key: DB_DATABASE_NAME
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-secret
                key: DB_PASSWORD

immich:
  metrics:
    enabled: false
  persistence:
    library:
      existingClaim: immich-library
  configuration: {}
  configurationKind: ConfigMap

valkey:
  enabled: false
  controllers:
    main:
      containers:
        main:
          image:
            repository: docker.io/valkey/valkey
            tag: 9.1-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
            pullPolicy: IfNotPresent
  persistence:
    data:
      enabled: true
      size: 1Gi
      type: emptyDir
      accessMode: ReadWriteOnce

server:
  enabled: true
  controllers:
    main:
      nodeSelector:
        kubernetes.io/hostname: s145
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/immich-server
            pullPolicy: IfNotPresent
  ingress:
    main:
      enabled: false
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
      hosts:
        - host: immich.local
          paths:
            - path: "/"
              service:
                identifier: main
      tls: []

machine-learning:
  enabled: true
  controllers:
    main:
      nodeSelector:
        kubernetes.io/hostname: s145
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/immich-machine-learning
            tag: v2.7.5
            pullPolicy: IfNotPresent
          env:
            TRANSFORMERS_CACHE: /cache
            HF_XET_CACHE: /cache/huggingface-xet
            MPLCONFIGDIR: /cache/matplotlib-config
  persistence:
    cache:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: immich-machine-learning-cache
