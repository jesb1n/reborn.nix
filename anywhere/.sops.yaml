# Copy this file to .sops.yaml after replacing the placeholder age recipients.
#
# This mirrors the retire.nix pattern:
# - master key: lives on your Mac and can edit/decrypt all secrets
# - mark key: lives on the admin machine and can edit/decrypt all secrets
# - host key: lives on oracle-eu-arm1 at /var/lib/sops-nix/key.txt and can decrypt
#   only this host's secrets during NixOS activation

keys:
  - &master age1pszh4rajt03mcmkhgxuyqkyrnu2qe9xgv9g93kymu06z0pzw0feqmrcph8
  - &mark age10dmkesu0j4zyr0xqkuvhzzdc2trlp93vlfvcwwfytzj9gefmp4equhleuw
  - &oracle_eu_arm1 age12qrmjz3gz582fl2vnw6az2w5qphchejk96ucxh0ep36wf0me24cqyug2s8
  - &oracle_eu_micro1 age1dwkqee4rc5z8me08r32xcct8n0ah6suygrjme747y5g39a9lkusqx4cdhg
  - &oracle_eu_micro2 age1hq0wftuc9ysu4tk89ner2cnf59smhwa8ynwxt62fjll6m7fff43swkr6lg
  - &rpi age1grhrmmx3xkvv9vfe5jtl33w6fntvc0095q35xdt0n8pz4neqnyaspld9y2
  - &s145_host age16039825yxfmxmgw6xd7ytd7p4zfpfuuv25czrpjsdlhcu3mrvursrxgl30
  - &s145_cluster age1f0zkp89kxtfgwm5wrdg0mdhgks93snxprjwkjdzmjr04f5yzqalszr74x7
  - &oracle_in_arm age1nry5l990f3ja66c3zhl9peejhu9284s4j8pytk2cwfufsvkrtvrsh6asfc
  - &oracle_in_micro1 age1hsdtg2f8xcc39exwy0gfmmhee60w95v7n5fhet6hmg7f6scqc9lqsfjmmp
  - &oracle_in_micro2 age1xw3mt3hjyqx53kv3ptflvyywr77fc8wsy5xm7h099eax0u8p2c6sfnww50

creation_rules:
  - path_regex: secrets/oracle-eu-arm1/.*
    key_groups:
      - age:
          - *master
          - *mark
          - *oracle_eu_arm1

  - path_regex: secrets/oracle-in-arm1/.*
    key_groups:
      - age:
          - *master
          - *mark
          - *oracle_in_arm

  - path_regex: secrets/oracle-in-micro1/.*
    key_groups:
      - age:
          - *master
          - *mark
          - *oracle_in_micro1

  - path_regex: secrets/oracle-in-micro2/.*
    key_groups:
      - age:
          - *master
          - *mark
          - *oracle_in_micro2

  - path_regex: secrets/k3s/.*
    key_groups:
      - age:
          - *master
          - *mark
          - *s145_host
          - *oracle_eu_arm1
          - *oracle_eu_micro1
          - *oracle_eu_micro2
          - *rpi
          - *oracle_in_arm
          - *oracle_in_micro1
          - *oracle_in_micro2

  - path_regex: secrets/tailscale/.*
    key_groups:
      - age:
          - *master
          - *mark
          - *oracle_eu_arm1
          - *oracle_eu_micro1
          - *oracle_eu_micro2
          - *rpi
          - *s145_host
          - *oracle_in_arm
          - *oracle_in_micro1
          - *oracle_in_micro2

  - path_regex: secrets/oracle-eu-micro1/.*
    key_groups:
      - age:
          - *master
          - *mark
          - *oracle_eu_micro1

  - path_regex: secrets/oracle-eu-micro2/.*
    key_groups:
      - age:
          - *master
          - *mark
          - *oracle_eu_micro2

  - path_regex: secrets/rpi/.*
    key_groups:
      - age:
          - *master
          - *mark
          - *rpi

  - path_regex: secrets/s145/.*
    key_groups:
      - age:
          - *master
          - *mark
          - *s145_host

  - path_regex: k8s/immich/immich-secret.yaml
    encrypted_regex: "^(data|stringData)$"
    key_groups:
      - age:
          - *master
          - *mark
          - *s145_cluster

  - path_regex: k8s/garage/garage-secret.yaml
    encrypted_regex: "^(data|stringData)$"
    key_groups:
      - age:
          - *master
          - *mark
          - *s145_cluster
